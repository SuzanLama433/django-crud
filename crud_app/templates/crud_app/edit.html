{% extends 'base.html' %} {% load static %} {% block title %} form
{% endblock title %} {% block content %}

<section>
    <div class="container">
        <div class="row">
            <div class="col-10 mx-auto my-3 alert alert-info">
                <form method="POST" action="{% url 'edit' data.id %}" enctype="multipart/form-data">
                    <!-- {% if messages %}
                    {% for message in messages  %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        <strong>Message!</strong> {{message}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                    {% endif %} -->

                    {% csrf_token %}
                    <h1 class="text-center">Form update</h1>
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" name="name" value="{{data.name}}" class="form-control" id="name"
                            aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" name="age" value="{{data.age}}" class="form-control" id="age"
                            aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" name="email" value="{{data.email}}" class="form-control" id="email"
                            aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <input type="text" name="message" value="{{data.message}}" class="form-control" id="message"
                            aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">

                        <label for="dob" class="form-label">Date of Birth</label>

                        {% if data.dob %}
                        {{data.dob}}

                        {% endif %}
                        <input type="date" name="dob" value="{{data.dob}}" class="form-control" id="dob"
                            aria-describedby="emailHelp" />
                    </div>

                    <div class="mb-3">
                        <label for="image" class="form-label">Image</label>

                        {% if data.image %}
                        <img src="{{data.image.url}}" height="40px" width="40px" alt="">
                        {% endif %}

                        <input type="file" name="image" class="form-control" id="image" aria-describedby="imageHelp" />
                    </div>

                    <button type="submit" class="btn btn-primary">Update</button>
                </form>
            </div>
        </div>
    </div>
</section>

{% endblock content %}
