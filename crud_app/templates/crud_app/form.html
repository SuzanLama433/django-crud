{% extends 'base.html' %} {% load static %} {% block title %} form
{% endblock title %} {% block content %}

<section>
    <div class="container">
        <div class="row">
            <div class="col-10 mx-auto my-3 alert alert-info">
                <form method="POST" action="{% url 'form' %}" enctype="multipart/form-data">
                    <!-- {% if messages %}
                    {% for message in messages  %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        <strong>Message!</strong> {{message}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                    {% endif %} -->

                    {% csrf_token %}
                    <h1 class="text-center">Form</h1>
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" id="name" aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" name="age" class="form-control" id="age" aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" id="exampleInputEmail1"
                            aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Message</label>
                        <input type="text" name="message" class="form-control" id="message"
                            aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="dob" class="form-label">Date of Birth</label>
                        <input type="date" name="dob" class="form-control" id="dob" aria-describedby="emailHelp" />
                    </div>
                    <div class="mb-3">
                        <label for="image" class="form-label">Image</label>
                        <input type="file" name="image" class="form-control" id="image" aria-describedby="emailHelp" />
                    </div>

                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>
</section>

{% endblock content %}
